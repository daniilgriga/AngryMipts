name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            git \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libopenal-dev \
            libflac-dev \
            libvorbis-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libudev-dev \
            nlohmann-json3-dev

      - name: Build and install SFML 3 on Linux
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 --branch 3.0.1 https://github.com/SFML/SFML.git /tmp/SFML
          cmake -S /tmp/SFML -B /tmp/SFML/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX="$HOME/sfml"
          cmake --build /tmp/SFML/build --parallel
          cmake --install /tmp/SFML/build

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install sfml nlohmann-json

      - name: Configure
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            export CMAKE_PREFIX_PATH="$HOME/sfml"
          else
            export CMAKE_PREFIX_PATH="$(brew --prefix sfml):$(brew --prefix nlohmann-json)"
          fi

          cmake -S . -B build-ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}"

      - name: Build
        run: cmake --build build-ci --parallel
