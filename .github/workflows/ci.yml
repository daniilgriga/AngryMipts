name: CI

on:
  # push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            git \
            libgtest-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libopenal-dev \
            libflac-dev \
            libvorbis-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            libudev-dev \
            nlohmann-json3-dev

      - name: Build and install SFML 3 on Linux
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 --branch 3.0.1 https://github.com/SFML/SFML.git /tmp/SFML
          cmake -S /tmp/SFML -B /tmp/SFML/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX="$HOME/sfml"
          cmake --build /tmp/SFML/build --parallel
          cmake --install /tmp/SFML/build

      - name: Export Linux build/runtime paths
        if: runner.os == 'Linux'
        run: |
          echo "CMAKE_PREFIX_PATH=$HOME/sfml" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/sfml/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install sfml nlohmann-json googletest

      - name: Export macOS CMake prefix
        if: runner.os == 'macOS'
        run: |
          echo "CMAKE_PREFIX_PATH=$(brew --prefix sfml):$(brew --prefix nlohmann-json):$(brew --prefix googletest)" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -S . -B build-ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}"

      - name: Build
        run: cmake --build build-ci --parallel

      - name: Test
        run: ctest --test-dir build-ci --output-on-failure
